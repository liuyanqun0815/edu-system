spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/edu_training?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:  # 如有密码则填写
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

# XXL-Job 配置
xxl:
  job:
    admin:
      addresses: http://localhost:8088/xxl-job-admin  # 调度中心地址
    accessToken: default_token  # 执行器通讯TOKEN
    executor:
      appname: edu-training-executor  # 执行器AppName
      address:  # 执行器注册地址,默认使用IP:PORT
      ip:  # 执行器IP,默认自动获取
      port: 9999  # 执行器通讯端口
      logpath: /data/applogs/xxl-job/jobhandler  # 日志路径
      logretentiondays: 30  # 日志保存天数
